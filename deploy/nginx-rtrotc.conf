# Nginx reverse proxy for www.rtrotc.com -> the Finance Team Toolkit (uvicorn
# on 127.0.0.1:8801). Place at /etc/nginx/sites-available/rtrotc.com and
# symlink into sites-enabled. Certbot rewrites this to add the TLS block and
# the HTTP->HTTPS redirect (see DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name rtrotc.com www.rtrotc.com;

    # Allow larger uploads (bank statements, GLs, certificates).
    client_max_body_size 40M;

    location / {
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # DGI / SMTP calls can be slow
    }
}
