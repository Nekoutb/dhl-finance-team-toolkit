<VirtualHost *:80>
    ServerName rtrotc.com
    ServerAlias www.rtrotc.com

    # Let Certbot answer the ACME challenge directly (no proxy)
    ProxyPass /.well-known/acme-challenge/ !

    # Everything else -> Finance Team Toolkit (gunicorn/uvicorn on 8801)
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    ProxyPass / http://127.0.0.1:8801/
    ProxyPassReverse / http://127.0.0.1:8801/
    ProxyTimeout 120

    # Bank statements / GL uploads can be sizeable
    LimitRequestBody 41943040

    ErrorLog ${APACHE_LOG_DIR}/rtrotc-error.log
    CustomLog ${APACHE_LOG_DIR}/rtrotc-access.log combined
</VirtualHost>
