<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · {{ cfg.app_name }}</title>
  <script>
    (function () { try { var t = localStorage.getItem("ft-theme");
      if (t) document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main style="min-height:100vh;display:grid;place-items:center;padding:24px;">
    <section class="panel" style="width:min(380px,92vw);">
      <div class="side-brand" style="padding:0 0 16px;">
        <span class="brand-mark" style="width:40px;height:40px;">FT</span>
        <span class="brand-text"><strong style="font-size:16px;">{{ cfg.app_name }}</strong>
          <small>{{ cfg.organization }}</small></span>
      </div>
      <h1 style="font-size:18px;margin:0 0 4px;">Sign in</h1>
      <p class="lead" style="font-size:13px;">Staff access — finance team only.</p>

      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

      <form action="/login" method="post">
        <input type="hidden" name="next" value="{{ next }}">
        <label class="field" style="margin-bottom:12px;">
          <span>Username</span>
          <input type="text" name="username" autocomplete="username" required autofocus>
        </label>
        <label class="field" style="margin-bottom:16px;">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" type="submit" style="width:100%;">Sign in</button>
      </form>
    </section>
  </main>
</body>
</html>
