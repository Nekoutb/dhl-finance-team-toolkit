<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Customer Statement{% endblock %} · {{ cfg.organization }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="portal-top">
    <span class="mark">{{ cfg.organization[:1] }}</span>
    <span>
      <strong>{{ cfg.organization }}</strong>
      <small>Customer statement &amp; payment allocation</small>
    </span>
  </header>
  <main class="container">{% block content %}{% endblock %}</main>
  <footer class="footer">
    <span>Secure customer link · {{ cfg.organization }}</span>
  </footer>
</body>
</html>
